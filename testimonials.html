<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Testimonials | Akash Bridal Mehndi</title>
  <meta
    name="description"
    content="Read client testimonials and bridal mehndi reviews for Akash Bridal Mehndi."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="testimonials.css" />
</head>
<body>
  <div class="page-ornament" aria-hidden="true">
    <span class="particle particle-1"></span>
    <span class="particle particle-2"></span>
    <span class="particle particle-3"></span>
    <span class="particle particle-4"></span>
    <span class="particle particle-5"></span>
    <span class="particle particle-6"></span>
    <span class="mehndi mehndi-left"></span>
    <span class="mehndi mehndi-right"></span>
  </div>

  <main class="testimonials-page">
    <section class="hero" aria-labelledby="hero-title">
      <p class="brand-name">Akash Bridal Mehndi</p>
      <h1 id="hero-title">Client Testimonials</h1>
      <p class="hero-copy">
        See what our brides and clients say about their mehndi experience.
      </p>
      <div class="hero-divider" aria-hidden="true">
        <span></span>
        <i></i>
        <span></span>
      </div>
    </section>

    <section class="testimonials-section" aria-labelledby="testimonials-heading">
      <div class="testimonials-container">
        <div class="testimonials-summary">
          <div>
            <p class="summary-kicker">Bride Reviews</p>
            <h2 id="testimonials-heading">Loved by brides and families</h2>
          </div>
          <div class="rating-summary" aria-live="polite">
            <span id="averageRating" class="average-rating">0.0</span>
            <div id="averageStars" class="average-stars" aria-label="Average rating"></div>
          </div>
        </div>

        <div id="reviewsList" class="reviews-scroll" aria-label="Client testimonials list"></div>

        <div class="section-action">
          <button id="viewMoreButton" class="view-more-button" type="button">
            View more
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Website Footer Component -->

  <script src="testimonials.js"></script>
</body>
</html>
